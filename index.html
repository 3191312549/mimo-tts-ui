<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiMo TTS 对话助手</title>
<style>
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #252525;
  --border: #333;
  --text: #e0e0e0;
  --text2: #999;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-dim: #3730a3;
  --green: #22c55e;
  --red: #ef4444;
  --radius: 10px;
  --transition: 0.2s ease;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}

header h1 {
  font-size: 18px;
  font-weight: 600;
  white-space: nowrap;
}

header h1 span { color: var(--accent); }

.api-key-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.api-key-wrap input, .server-url-wrap input {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 6px;
  width: 260px;
  font-size: 13px;
  font-family: monospace;
}

.api-key-wrap input:focus, .server-url-wrap input:focus { outline: none; border-color: var(--accent); }

.server-url-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
}

.server-url-wrap input {
  width: 220px;
  font-size: 12px;
}

.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
.status-dot.err { background: var(--red); }
.status-dot.idle { background: #555; }

main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── 侧边栏 ── */
.sidebar {
  width: 320px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 16px;
  overflow-y: auto;
  flex-shrink: 0;
}

.mode-tabs {
  display: flex;
  gap: 4px;
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 4px;
}

.mode-tab {
  flex: 1;
  text-align: center;
  padding: 8px 4px;
  border-radius: 7px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text2);
  transition: var(--transition);
}

.mode-tab.active {
  background: var(--accent);
  color: #fff;
}

.sidebar label {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.sidebar select, .sidebar textarea, .sidebar input[type="text"] {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  padding: 8px 10px;
  font-size: 13px;
  font-family: inherit;
  resize: vertical;
}

.sidebar select:focus, .sidebar textarea:focus, .sidebar input[type="text"]:focus {
  outline: none; border-color: var(--accent);
}

.sidebar textarea { min-height: 60px; }

.file-upload {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  color: var(--text2);
  font-size: 13px;
}

.file-upload:hover { border-color: var(--accent); color: var(--accent); }
.file-upload.has-file { border-color: var(--green); color: var(--green); }

.file-upload input[type="file"] { display: none; }

.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.toggle {
  width: 44px; height: 24px;
  background: var(--border);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  transition: var(--transition);
}

.toggle.on { background: var(--accent); }

.toggle::after {
  content: '';
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  position: absolute;
  top: 3px; left: 3px;
  transition: var(--transition);
}

.toggle.on::after { left: 23px; }

/* ── 对话区域 ── */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.msg {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: var(--radius);
  line-height: 1.55;
  font-size: 14px;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg.user {
  align-self: flex-end;
  background: var(--accent-dim);
  color: #fff;
  border-bottom-right-radius: 3px;
}

.msg.assistant {
  align-self: flex-start;
  background: var(--surface2);
  border-bottom-left-radius: 3px;
}

.msg .meta {
  font-size: 11px;
  color: var(--text2);
  margin-top: 4px;
  display: flex;
  gap: 10px;
  align-items: center;
}

.msg .meta .play-btn {
  background: var(--accent);
  border: none;
  color: #fff;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  transition: var(--transition);
}

.msg .meta .play-btn:hover { background: var(--accent-hover); }
.msg .meta .play-btn.playing { background: var(--red); }
.msg .meta .play-btn .spinner {
  display: inline-block;
  width: 10px; height: 10px;
  border: 2px solid transparent;
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 4px;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 输入区域 ── */
.input-area {
  padding: 16px 20px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-area textarea {
  flex: 1;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  padding: 12px 14px;
  font-size: 14px;
  font-family: inherit;
  resize: none;
  min-height: 46px;
  max-height: 120px;
  line-height: 1.5;
}

.input-area textarea:focus { outline: none; border-color: var(--accent); }

.input-area textarea::placeholder { color: #555; }

.btn-send {
  width: 46px; height: 46px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  transition: var(--transition);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.btn-send:hover { background: var(--accent-hover); }
.btn-send:disabled { opacity: 0.4; cursor: not-allowed; }

.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  gap: 8px;
}

.empty-state .icon { font-size: 48px; opacity: 0.3; }
.empty-state p { font-size: 14px; }

/* ── 响应式 ── */
@media (max-width: 768px) {
  main { flex-direction: column; }
  .sidebar { width: 100%; max-height: 200px; flex-shrink: 0; }
  header { flex-wrap: wrap; }
  .api-key-wrap, .server-url-wrap { width: 100%; }
  .api-key-wrap input, .server-url-wrap input { flex: 1; }
}
</style>
</head>
<body>

<header>
  <h1><span>MiMo</span> TTS 对话助手</h1>
  <div class="server-url-wrap">
    <input type="text" id="serverUrl" placeholder="API 地址 (留空=直连MiMo)" title="可选填 Cloudflare Worker URL 作为CORS代理">
  </div>
  <div class="api-key-wrap">
    <div class="status-dot idle" id="statusDot" title="API 状态"></div>
    <input type="password" id="apiKey" placeholder="输入 API Key" autocomplete="off">
  </div>
</header>

<main>
  <!-- 侧边栏配置 -->
  <aside class="sidebar">
    <div>
      <label>模式</label>
      <div class="mode-tabs" id="modeTabs">
        <button class="mode-tab active" data-mode="preset">预置音色</button>
        <button class="mode-tab" data-mode="design">音色设计</button>
        <button class="mode-tab" data-mode="clone">音色复刻</button>
      </div>
    </div>

    <!-- Preset 模式配置 -->
    <div id="presetConfig">
      <label>音色选择</label>
      <select id="voiceSelect">
        <option value="Chloe">Chloe - 英文/女性</option>
        <option value="Mia">Mia - 英文/女性</option>
        <option value="Milo">Milo - 英文/男性</option>
        <option value="Dean">Dean - 英文/男性</option>
        <option value="冰糖">冰糖 - 中文/女性</option>
        <option value="茉莉">茉莉 - 中文/女性</option>
        <option value="苏打">苏打 - 中文/男性</option>
        <option value="白桦">白桦 - 中文/男性</option>
        <option value="mimo_default">MiMo-默认</option>
      </select>
      <label style="margin-top:12px">风格控制</label>
      <input type="text" id="styleInput" placeholder="如: Happy, energetic tone...">
    </div>

    <!-- Design 模式配置 -->
    <div id="designConfig" style="display:none">
      <label>音色描述</label>
      <textarea id="voiceDesc" placeholder="如: Young female, warm and gentle tone, natural pace.">Young female, warm and gentle tone, natural pace.</textarea>
    </div>

    <!-- Clone 模式配置 -->
    <div id="cloneConfig" style="display:none">
      <label>参考音频</label>
      <div class="file-upload" id="fileDrop">
        <span id="fileName">点击或拖拽上传参考音频<br><small>支持 WAV / MP3 / M4A / FLAC / OGG</small></span>
        <input type="file" id="refAudio" accept="audio/*">
      </div>
    </div>

    <div class="toggle-row">
      <label style="margin:0">流式输出</label>
      <div class="toggle on" id="streamToggle"></div>
    </div>
  </aside>

  <!-- 对话区域 -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state">
        <div class="icon">&#x1f399;</div>
        <p>输入 API Key，即可开始语音合成</p>
      </div>
    </div>
    <div class="input-area">
      <textarea id="textInput" placeholder="输入要合成的文本..." rows="1"></textarea>
      <button class="btn-send" id="btnSend" title="发送">▶</button>
    </div>
  </div>
</main>

<script>
// ── 状态 ──
const state = {
  mode: 'preset',
  voice: 'Chloe',
  style: '',
  voiceDesc: 'Young female, warm and gentle tone, natural pace.',
  refAudioBase64: null,
  refAudioMime: null,
  refFileName: null,
  stream: true,
  apiKey: '',
  serverUrl: '',
  audioContext: null,
  playingSource: null,
  history: []
};

// ── 持久化存储 ──
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem('mimo_state'));
    if (saved) {
      if (saved.apiKey) { state.apiKey = saved.apiKey; dom.apiKey.value = saved.apiKey; }
      if (saved.serverUrl !== undefined) { state.serverUrl = saved.serverUrl; dom.serverUrl.value = saved.serverUrl; }
    }
  } catch {}
}
function saveState() {
  try {
    localStorage.setItem('mimo_state', JSON.stringify({
      apiKey: state.apiKey,
      serverUrl: state.serverUrl
    }));
  } catch {}
}

// ── DOM 缓存 ──
const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => [...(p || document).querySelectorAll(s)];

const dom = {
  apiKey: $('#apiKey'),
  serverUrl: $('#serverUrl'),
  statusDot: $('#statusDot'),
  modeTabs: $$('#modeTabs .mode-tab'),
  presetConfig: $('#presetConfig'),
  designConfig: $('#designConfig'),
  cloneConfig: $('#cloneConfig'),
  voiceSelect: $('#voiceSelect'),
  styleInput: $('#styleInput'),
  voiceDesc: $('#voiceDesc'),
  fileDrop: $('#fileDrop'),
  refAudio: $('#refAudio'),
  fileName: $('#fileName'),
  streamToggle: $('#streamToggle'),
  messages: $('#messages'),
  textInput: $('#textInput'),
  btnSend: $('#btnSend'),
};

// ── API 配置 ──
dom.apiKey.addEventListener('input', () => {
  state.apiKey = dom.apiKey.value.trim();
  saveState();
  updateStatus('idle');
});

dom.apiKey.addEventListener('blur', () => {
  if (state.apiKey.length > 20 && state.isProxy) checkApiKey();
});

dom.serverUrl.addEventListener('input', () => {
  state.serverUrl = dom.serverUrl.value.trim();
  saveState();
  updateStatus('idle');
});

// 默认直连 MiMo API（无需代理时可设 serverUrl 为空则直连）
const MIMO_DIRECT = 'https://api.xiaomimimo.com/v1';

Object.defineProperty(state, 'isProxy', {
  get() { return !!this.serverUrl; }
});

Object.defineProperty(state, 'baseUrl', {
  get() { return this.serverUrl || MIMO_DIRECT; }
});

function apiUrl(path) {
  if (path === '/api/chat/completions') path = '/chat/completions';
  else if (path === '/api/check') path = '/models';
  return state.baseUrl.replace(/\/+$/, '') + path;
}

function authHeaders() {
  return { 'api-key': state.apiKey };
}

async function checkApiKey() {
  updateStatus('idle');
  try {
    const resp = await fetch(apiUrl('/api/check'), {
      headers: authHeaders()
    });
    updateStatus(resp.ok ? 'ok' : 'err');
  } catch {
    updateStatus('err');
  }
}

function updateStatus(status) {
  dom.statusDot.className = 'status-dot ' + status;
}

// ── 模式切换 ──
dom.modeTabs.forEach(tab => {
  tab.addEventListener('click', () => {
    dom.modeTabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.mode = tab.dataset.mode;
    dom.presetConfig.style.display = state.mode === 'preset' ? '' : 'none';
    dom.designConfig.style.display = state.mode === 'design' ? '' : 'none';
    dom.cloneConfig.style.display = state.mode === 'clone' ? '' : 'none';
  });
});

// ── 音色选择 ──
dom.voiceSelect.addEventListener('change', () => {
  state.voice = dom.voiceSelect.value;
});
dom.styleInput.addEventListener('input', () => {
  state.style = dom.styleInput.value;
});

// ── 音色设计描述 ──
dom.voiceDesc.addEventListener('input', () => {
  state.voiceDesc = dom.voiceDesc.value;
});

// ── 文件上传 ──
dom.fileDrop.addEventListener('click', () => dom.refAudio.click());
dom.refAudio.addEventListener('change', () => {
  const file = dom.refAudio.files[0];
  if (file) handleAudioFile(file);
});

dom.fileDrop.addEventListener('dragover', e => {
  e.preventDefault();
  dom.fileDrop.style.borderColor = 'var(--accent)';
});
dom.fileDrop.addEventListener('dragleave', () => {
  dom.fileDrop.style.borderColor = 'var(--border)';
});
dom.fileDrop.addEventListener('drop', e => {
  e.preventDefault();
  dom.fileDrop.style.borderColor = 'var(--border)';
  const file = e.dataTransfer.files[0];
  if (file) handleAudioFile(file);
});

function handleAudioFile(file) {
  const reader = new FileReader();
  reader.onload = () => {
    const b64 = reader.result.split(',')[1];
    state.refAudioBase64 = b64;
    state.refAudioMime = file.type || 'audio/wav';
    state.refFileName = file.name;
    dom.fileName.innerHTML = `✅ ${file.name}<br><small>已就绪</small>`;
    dom.fileDrop.classList.add('has-file');
  };
  reader.readAsDataURL(file);
}

// ── 流式开关 ──
dom.streamToggle.addEventListener('click', () => {
  state.stream = !state.stream;
  dom.streamToggle.classList.toggle('on', state.stream);
});

// ── 发送消息 ──
dom.btnSend.addEventListener('click', sendMessage);
dom.textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
dom.textInput.addEventListener('input', () => {
  dom.textInput.style.height = 'auto';
  dom.textInput.style.height = Math.min(dom.textInput.scrollHeight, 120) + 'px';
});

async function sendMessage() {
  const text = dom.textInput.value.trim();
  if (!text) return;
  if (!state.apiKey) {
    alert('请先输入 API Key');
    dom.apiKey.focus();
    return;
  }
  if (state.mode === 'clone' && !state.refAudioBase64) {
    alert('请先上传参考音频');
    return;
  }

  dom.textInput.value = '';
  dom.textInput.style.height = 'auto';
  dom.btnSend.disabled = true;
  updateStatus('idle');

  // 清除空状态
  const empty = $('.empty-state');
  if (empty) empty.remove();

  // 用户消息
  addMessage('user', text);
  state.history.push({ role: 'user', content: text });

  // 助手占位
  const assistantEl = addMessage('assistant', '', true);
  const metaEl = document.createElement('div');
  metaEl.className = 'meta';
  assistantEl.appendChild(metaEl);

  const t0 = performance.now();

  try {
    const body = buildRequestBody(text);
    let audioData = null;

    if (state.stream) {
      audioData = await streamTTS(body, assistantEl, metaEl, t0);
    } else {
      audioData = await nonStreamTTS(body, assistantEl, metaEl, t0);
    }

    if (audioData && audioData.length > 0) {
      state.history.push({ role: 'assistant', content: text, audio: audioData });
      addPlayButton(metaEl, audioData);
    } else {
      metaEl.textContent = '⚠️ 未收到音频数据';
    }

    updateStatus('ok');
  } catch (err) {
    console.error(err);
    let msg = err.message || '未知错误';
    if (msg === 'Failed to fetch') {
      msg = '请求被阻止（CORS跨域限制）。请在 Server URL 中填入代理地址，或运行 python mimo_chat.py --serve 使用本地代理。';
    }
    metaEl.textContent = '❌ 请求失败: ' + msg;
    updateStatus('err');
  } finally {
    dom.btnSend.disabled = false;
    dom.textInput.focus();
  }
}

function buildRequestBody(text) {
  let messages, model, audioParams = { format: 'pcm16' };

  if (state.mode === 'preset') {
    model = 'mimo-v2.5-tts';
    messages = [
      { role: 'user', content: state.style || 'Default tone, natural pace.' },
      { role: 'assistant', content: text }
    ];
    audioParams.voice = state.voice;
  } else if (state.mode === 'design') {
    model = 'mimo-v2.5-tts-voicedesign';
    messages = [
      { role: 'user', content: state.voiceDesc },
      { role: 'assistant', content: text }
    ];
    audioParams.optimize_text_preview = true;
  } else {
    model = 'mimo-v2.5-tts-voiceclone';
    messages = [
      { role: 'user', content: '' },
      { role: 'assistant', content: text }
    ];
    audioParams.voice = `data:${state.refAudioMime};base64,${state.refAudioBase64}`;
  }

  return { model, messages, audio: audioParams, stream: state.stream };
}

async function nonStreamTTS(body, assistantEl, metaEl, t0) {
  const resp = await fetch(apiUrl('/api/chat/completions'), {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...authHeaders()
    },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }

  const data = await resp.json();
  const audioB64 = data.choices?.[0]?.message?.audio?.data;
  if (!audioB64) throw new Error('No audio in response');

  const pcm = base64ToFloat32(audioB64);
  const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
  const duration = (pcm.length / 24000).toFixed(1);
  metaEl.textContent = `⏱ ${elapsed}s | 时长 ${duration}s`;

  return pcm;
}

async function streamTTS(body, assistantEl, metaEl, t0) {
  let collected = new Float32Array(0);

  const resp = await fetch(apiUrl('/api/chat/completions'), {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      ...authHeaders()
    },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${resp.status}`);
  }

  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed.startsWith('data: ')) continue;
      const jsonStr = trimmed.slice(6);
      if (jsonStr === '[DONE]') continue;

      try {
        const chunk = JSON.parse(jsonStr);
        const audioB64 = chunk.choices?.[0]?.delta?.audio?.data;
        if (audioB64) {
          const pcm = base64ToFloat32(audioB64);
          const merged = new Float32Array(collected.length + pcm.length);
          merged.set(collected);
          merged.set(pcm, collected.length);
          collected = merged;
        }
      } catch {}
    }
  }

  const elapsed = ((performance.now() - t0) / 1000).toFixed(1);
  const duration = (collected.length / 24000).toFixed(1);
  metaEl.textContent = `⏱ ${elapsed}s | 时长 ${duration}s`;

  return collected;
}

function base64ToFloat32(b64) {
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const int16 = new Int16Array(bytes.buffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;
  return float32;
}

// ── 消息 UI ──
function addMessage(role, text, isPlaceholder) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text || (isPlaceholder ? '' : text);
  dom.messages.appendChild(el);
  dom.messages.scrollTop = dom.messages.scrollHeight;
  return el;
}

function addPlayButton(container, audioData) {
  const btn = document.createElement('button');
  btn.className = 'play-btn';
  btn.textContent = '▶ 播放';
  btn.addEventListener('click', () => togglePlay(btn, audioData));
  container.appendChild(btn);
}

// ── 音频播放 ──
function togglePlay(btn, audioData) {
  if (state.playingSource) {
    state.playingSource.stop();
    state.playingSource = null;
  }

  if (btn.classList.contains('playing')) {
    btn.classList.remove('playing');
    btn.textContent = '▶ 播放';
    return;
  }

  // 停止其他播放
  $$('.play-btn.playing').forEach(b => {
    b.classList.remove('playing');
    b.textContent = '▶ 播放';
  });

  btn.classList.add('playing');
  btn.innerHTML = '<span class="spinner"></span>播放中';

  if (!state.audioContext) {
    state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }

  const ctx = state.audioContext;
  const buffer = ctx.createBuffer(1, audioData.length, 24000);
  buffer.getChannelData(0).set(audioData);

  const source = ctx.createBufferSource();
  source.buffer = buffer;
  source.connect(ctx.destination);

  source.onended = () => {
    btn.classList.remove('playing');
    btn.textContent = '▶ 播放';
    state.playingSource = null;
  };

  source.start();
  state.playingSource = source;
}

// ── 初始化 ──
state.voice = dom.voiceSelect.value;
state.stream = true;
loadState();
</script>
